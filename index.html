 <!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oreste AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: blue;
    color: white;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.box {
    background: blue;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.mic {
    font-size: 90px;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

button {
    background: red;
    color: white;
    border: none;
    border-radius: 25px;
    padding: 12px;
    margin-top: 10px;
    width: 100%;
    font-size: 16px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h1>🎤 Oreste AI</h1>
<p>Assistente vocale PRO</p>

<div class="mic">🎤</div>

<button onclick="startVoice()">Parla</button>

<input type="text" id="textInput" placeholder="Scrivi un comando...">
<button onclick="handleText()">Invia</button>

<p id="output"></p>

</div>
</div>

<script>

let userName = localStorage.getItem("userName") || "";
let lastCommand = "";

// 🔊 VOCE
function speak(text){
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "it-IT";
    window.speechSynthesis.speak(speech);
}

// 📅 DATA
function formatData(d){
    const giorni = ["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"];
    const mesi = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
    return `${giorni[d.getDay()]} ${d.getDate()} ${mesi[d.getMonth()]} ${d.getFullYear()}`;
}

// 🎤 VOCE
function startVoice(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        speak("Microfono non supportato");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "it-IT";

    recognition.start();

    recognition.onresult = function(event){
        const text = event.results[0][0].transcript.toLowerCase().trim();
        document.getElementById("output").innerText = "Hai detto: " + text;
        handleCommand(text);
    };

    recognition.onerror = function(){
        speak("Errore microfono");
    };
}

// ⌨️ TESTO
function handleText(){
    const text = document.getElementById("textInput").value.toLowerCase().trim();
    handleCommand(text);
}

// 🌐 SITI
function openSite(name, url){
    speak("Apro " + name);
    window.open(url, "_blank");
}

// 🧠 RISPOSTE
function randomReply(){
    const r = [
        "Non ho capito bene",
        "Puoi ripetere?",
        "Sto imparando questo comando",
        "Non conosco questa richiesta"
    ];
    speak(r[Math.floor(Math.random()*r.length)]);
}

// 🌦️ METEO CITTÀ
async function getWeather(city = "Napoli"){
    try{
        speak("Controllo il meteo di " + city);

        const url = `https://wttr.in/${city}?format=3`;
        const response = await fetch(url);
        const data = await response.text();

        document.getElementById("output").innerText = data;
        speak(data);

    } catch(e){
        speak("Errore nel meteo");
    }
}

// 📍 METEO GPS
function getWeatherByLocation(){

    if(!navigator.geolocation){
        speak("Geolocalizzazione non supportata");
        return;
    }

    speak("Controllo la tua posizione");

    navigator.geolocation.getCurrentPosition(async function(position){

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        try{
            const url = `https://wttr.in/${lat},${lon}?format=3`;
            const response = await fetch(url);
            const data = await response.text();

            document.getElementById("output").innerText = data;
            speak("Ecco il meteo: " + data);

        } catch(e){
            speak("Errore nel meteo");
        }

    }, function(){
        speak("Permesso posizione negato");
    });
}

// 🧠 CORE
function handleCommand(text){

    lastCommand = text;

    if(text.includes("oreste")){
        speak("Dimmi");
        return;
    }

    // 🌐 SITI
    if(text.includes("google")) return openSite("Google","https://www.google.com");
    if(text.includes("youtube")) return openSite("YouTube","https://www.youtube.com");
    if(text.includes("canva")) return openSite("Canva","https://www.canva.com");
    if(text.includes("facebook")) return openSite("Facebook","https://www.facebook.com");
    if(text.includes("chatgpt")) return openSite("ChatGPT","https://chatgpt.com/");
    if(text.includes("linkedin")) return openSite("LinkedIn","https://www.linkedin.com/feed/");
    if(text.includes("twitter")) return openSite("X","https://x.com/?lang=it");
    if(text.includes("pinterest")) return openSite("Pinterest","https://it.pinterest.com/");
    if(text.includes("instagram")) return openSite("Instagram","https://www.instagram.com/");
    if(text.includes("tiktok") || text.includes("tik tok")) return openSite("TikTok","https://www.tiktok.com/it-IT/");
    if(text.includes("reddit")) return openSite("Reddit","https://www.reddit.com/");

    // 🌐 SITI TUOI
    if(text.includes("amnesty international") || text.includes("amnesty")){
        return openSite("Amnesty International","https://iostoconamnesty.altervista.org");
    }

    if(text.includes("non ti arrendere") || text.includes("nontiarrendere")){
        return openSite("Non Ti Arrendere","https://nontiarrendere.altervista.org");
    }

    // ⏰ ORARIO
    if(text.includes("ora") || text.includes("ore")){
        const now = new Date();
        const ora = now.getHours().toString().padStart(2,"0");
        const min = now.getMinutes().toString().padStart(2,"0");
        return speak("Sono le " + ora + ":" + min);
    }

    // 📅 DATA
    if(
        text.includes("giorno") ||
        text.includes("data") ||
        text.includes("oggi") ||
        text.includes("domani") ||
        text.includes("ieri")
    ){
        let d = new Date();

        if(text.includes("domani")){
            d.setDate(d.getDate() + 1);
            return speak("Domani sarà " + formatData(d));
        }

        if(text.includes("ieri")){
            d.setDate(d.getDate() - 1);
            return speak("Ieri era " + formatData(d));
        }

        return speak("Oggi è " + formatData(d));
    }

    // 🌤️ METEO DOMANI (PRIMA!)
    if(text.includes("domani") && (text.includes("meteo") || text.includes("tempo"))){
        return openSite("Meteo Domani",
        "https://www.google.com/search?q=meteo+domani");
    }

    // 🌍 METEO CITTÀ
    if(text.includes("meteo a") || text.includes("tempo a")){
        let city = text.replace("meteo a","").replace("tempo a","").trim();
        return getWeather(city || "Napoli");
    }

    // 📍 METEO AUTOMATICO
    if(text.includes("meteo") || text.includes("tempo")){
        return getWeatherByLocation();
    }

    // 👤 NOME
    if(text.includes("mi chiamo")){
        userName = text.replace("mi chiamo ","");
        localStorage.setItem("userName", userName);
        return speak("Piacere " + userName);
    }

    // 👋 SALUTO
    if(text.includes("ciao")){
        return speak(userName ? "Ciao " + userName : "Ciao!");
    }

    // 🔁 RIPETI
    if(text.includes("ripeti")){
        return speak(lastCommand);
    }

    randomReply();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oreste AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: blue;
    color: white;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.box {
    background: blue;
    padding: 25px;
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    font-size: 26px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    background: red;
    color: white;
    border: none;
    border-radius: 25px;
    padding: 12px 16px;
    margin-top: 10px;
    font-size: 16px;
    width: 100%;
}

button:hover {
    background: darkred;
}

button:active {
    background: yellow;
}

#output {
    margin-top: 15px;
    font-size: 16px;
}

.mic {
    font-size: 70px;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h1>🎤 Oreste AI</h1>
<p>Assistente vocale</p>

<div class="mic">🎤</div>

<button onclick="startVoice()">Parla</button>

<input type="text" id="textInput" placeholder="Scrivi un comando...">
<button onclick="handleText()">Invia</button>

<p id="output"></p>

</div>
</div>

<script>

let userName = localStorage.getItem("userName") || "";
let lastCommand = "";

// 🔊 VOCE
function speak(text){
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "it-IT";
    window.speechSynthesis.speak(speech);
}

// 🎤 MICROFONO (FIX MOBILE)
function startVoice(){

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        speak("Il tuo dispositivo non supporta il microfono. Usa la scrittura.");
        document.getElementById("output").innerText =
            "❌ Microfono non supportato";
        return;
    }

    try {
        const recognition = new SpeechRecognition();

        recognition.lang = "it-IT";
        recognition.continuous = false;
        recognition.interimResults = false;

        document.getElementById("output").innerText = "🎤 Parla ora...";
        speak("Parla ora");

        recognition.start();

        recognition.onstart = function(){
            document.getElementById("output").innerText = "🎤 Sto ascoltando...";
        };

        recognition.onresult = function(event){
            const text = event.results[0][0].transcript.toLowerCase();

            document.getElementById("output").innerText =
                "Hai detto: " + text;

            handleCommand(text);
        };

        recognition.onerror = function(event){
            console.log("Errore voce:", event.error);

            if(event.error === "not-allowed"){
                speak("Permesso microfono negato. Attivalo nelle impostazioni.");
            }
            else if(event.error === "no-speech"){
                speak("Non ho sentito nulla, riprova.");
            }
            else{
                speak("Errore microfono. Usa la tastiera.");
            }

            document.getElementById("output").innerText =
                "❌ Errore voce";
        };

    } catch(e){
        console.log(e);
        speak("Errore microfono sul dispositivo");
    }
}

// ⌨️ TESTO
function handleText(){
    const text = document.getElementById("textInput").value.toLowerCase();
    document.getElementById("output").innerText = text;
    handleCommand(text);
}

// 🌐 SITI
function openSite(name, url){
    speak("Apro " + name);
    window.open(url, "_blank");
}

// 🧠 COMANDI
function handleCommand(text){

    lastCommand = text;

    if(text.includes("apri google")){
        openSite("Google","https://www.google.com");
    }

    else if(text.includes("apri youtube")){
        openSite("YouTube","https://www.youtube.com");
    }

    else if(text.includes("musica")){
        openSite("Musica","https://www.youtube.com/results?search_query=musica");
    }

    else if(text.includes("che ore sono")){
        speak(new Date().toLocaleTimeString());
    }

    else if(text.includes("ciao")){
        speak(userName ? "Ciao " + userName : "Ciao!");
    }

    else if(text.includes("mi chiamo ")){
        userName = text.replace("mi chiamo ","");
        localStorage.setItem("userName", userName);
        speak("Piacere " + userName);
    }

    else if(text.includes("ripeti")){
        speak(lastCommand);
    }

    else{
        speak("Non ho capito");
    }
}

</script>

</body>
</html>

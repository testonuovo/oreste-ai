<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oreste AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:blue;
    color: white;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.box {
    background:blue;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.mic {
    font-size:90px;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

button {
    background: red;
    color: white;
    border: none;
    border-radius: 25px;
    padding: 12px;
    margin-top: 10px;
    width: 100%;
    font-size: 16px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h1>🎤 Oreste AI</h1>
<p>Assistente vocale PRO</p>

<div class="mic">🎤</div>

<button onclick="startVoice()">Parla</button>

<input type="text" id="textInput" placeholder="Scrivi un comando...">
<button onclick="handleText()">Invia</button>

<p id="output"></p>

</div>
</div>

<script>

let userName = localStorage.getItem("userName") || "";
let lastCommand = "";

// 🔊 VOCE
function speak(text){
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "it-IT";
    window.speechSynthesis.speak(speech);
}

// 📅 DATA FORMAT
function formatData(d){
    return d.toLocaleDateString("it-IT", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
    });
}

// ⏳ PARSING GIORNI
function parseGiorni(text){

    let match = text.match(/(\d+)\s*(giorno|giorni)/);
    if(match) return parseInt(match[1]);

    if(text.includes("una settimana")) return 7;
    if(text.includes("due settimane")) return 14;

    return null;
}

// 🎤 VOCE
function startVoice(){

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        speak("Microfono non supportato");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "it-IT";

    recognition.start();

    recognition.onresult = function(event){
        const text = event.results[0][0].transcript.toLowerCase();
        document.getElementById("output").innerText = "Hai detto: " + text;
        handleCommand(text);
    };

    recognition.onerror = function(){
        speak("Errore microfono");
    };
}

// ⌨️ TESTO
function handleText(){
    const text = document.getElementById("textInput").value.toLowerCase();
    handleCommand(text);
}

// 🌐 SITI
function openSite(name, url){
    speak("Apro " + name);
    window.open(url, "_blank");
}

// 🧠 RISPOSTE CASUALI
function randomReply(){
    const r = [
        "Non ho capito",
        "Puoi ripetere?",
        "Sto imparando",
        "Interessante"
    ];
    speak(r[Math.floor(Math.random()*r.length)]);
}

// 🧠 CUORE ORESTE AI
function handleCommand(text){

    lastCommand = text;

    if(text.includes("oreste")){
        speak("Dimmi");
        return;
    }

    if(text.includes("google")) return openSite("Google","https://www.google.com");
    if(text.includes("youtube")) return openSite("YouTube","https://www.youtube.com");
    if(text.includes("canva")) return openSite("Canva","https://www.canva.com");
    if(text.includes("facebook")) return openSite("Facebook","https://www.facebook.com");

    if(text.includes("che ore")){
        return speak("Sono le " + new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}));
    }

    if(text.includes("giorno") || text.includes("data")){

        let d = new Date();

        if(text.includes("domani")){
            d.setDate(d.getDate() + 1);
            return speak("Domani sarà " + formatData(d));
        }

        if(text.includes("ieri")){
            d.setDate(d.getDate() - 1);
            return speak("Ieri era " + formatData(d));
        }

        return speak("Oggi è " + formatData(d));
    }

    if(text.includes("tra")){

        let giorni = parseGiorni(text);

        if(giorni !== null){
            let d = new Date();
            d.setDate(d.getDate() + giorni);

            if(giorni === 1){
                return speak("Domani sarà " + formatData(d));
            }

            return speak("Tra " + giorni + " giorni sarà " + formatData(d));
        }

        return speak("Non ho capito il numero di giorni");
    }

    if(text.includes("mi chiamo")){
        userName = text.replace("mi chiamo ","");
        localStorage.setItem("userName", userName);
        return speak("Piacere " + userName);
    }

    if(text.includes("ciao")){
        return speak(userName ? "Ciao " + userName : "Ciao!");
    }

    if(text.includes("ripeti")){
        return speak(lastCommand);
    }

    randomReply();
}

</script>

</body>
</html>

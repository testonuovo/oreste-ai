<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oreste AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: blue;
    color: white;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: blue;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    font-size: 28px;
    margin-bottom: 5px;
}

input {
    padding: 12px;
    width: 90%;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

button {
    background: red;
    color: white;
    border: none;
    border-radius: 25px;
    padding: 12px 18px;
    margin: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

#output {
    margin-top: 15px;
    font-size: 16px;
}

.mic {
    font-size: 90px;
}
</style>
</head>

<body>

<div class="container">
    <div class="box">

        <h1>🎤 Oreste AI</h1>
        <p>Il tuo assistente vocale intelligente</p>

        <div class="mic">🎤</div><br>

        <button onclick="startVoice()">Parla</button>

        <br>

        <input type="text" id="textInput" placeholder="Scrivi un comando...">
        <br>

        <button onclick="handleText()">Invia</button>

        <p id="output"></p>

    </div>
</div>

<script>
let userName = localStorage.getItem("userName");
let lastCommand = localStorage.getItem("lastCommand");

// 🔊 VOCE
function speak(text){
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "it-IT";
    speech.rate = 1;
    window.speechSynthesis.speak(speech);
}

// 🎤 VOCE
function startVoice(){

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Microfono non supportato");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "it-IT";

    document.getElementById("output").innerText = "🎤 Ascolto...";

    recognition.start();

    recognition.onresult = function(event){
        const text = event.results[0][0].transcript.toLowerCase();
        document.getElementById("output").innerText = "Hai detto: " + text;
        handleCommand(text);
    };
}

// ⌨️ TESTO
function handleText(){
    const text = document.getElementById("textInput").value.toLowerCase();
    document.getElementById("output").innerText = "Hai scritto: " + text;
    handleCommand(text);
}

// 🌐 APRI SITO
function openSite(name, url){
    speak("Apro " + name);
    window.open(url, "_blank");
}

// 🧠 COMANDI
function handleCommand(text){

    localStorage.setItem("lastCommand", text);

    // 🌐 SITI
    if(text.includes("apri google")){
        openSite("Google","https://www.google.com");
    }

    else if(text.includes("apri youtube")){
        openSite("YouTube","https://www.youtube.com");
    }

    else if(text.includes("apri github")){
        openSite("GitHub","https://github.com");
    }

    else if(text.includes("apri canva")){
        openSite("Canva","https://www.canva.com");
    }

    else if(text.includes("apri chatgpt")){
        openSite("ChatGPT","https://chat.openai.com");
    }

    else if(text.includes("apri linkedin")){
        openSite("LinkedIn","https://www.linkedin.com/feed/");
    }

    else if(text.startsWith("apri ")){
        let sito = text.replace("apri ","").trim();
        openSite(sito, "https://www."+sito+".com");
    }

    // 🔎 RICERCA
    else if(text.startsWith("cerca ")){
        let query = text.replace("cerca ","");
        speak("Cerco " + query);
        window.open("https://www.google.com/search?q="+query, "_blank");
    }

    // 🕒 INFO
    else if(text.includes("che ore sono")){
        speak("Sono le " + new Date().toLocaleTimeString());
    }

    else if(text.includes("che giorno è")){
        speak("Oggi è il " + new Date().toLocaleDateString());
    }

    // 👤 UTENTE
    else if(text.startsWith("mi chiamo ")){
        userName = text.replace("mi chiamo ","");
        localStorage.setItem("userName", userName);
        speak("Piacere " + userName);
    }

    else if(text.includes("ciao")){
        speak(userName ? "Ciao " + userName : "Ciao! Sono Oreste AI");
    }

    // 🤖 INFO
    else if(text.includes("chi sei")){
        speak("Sono Oreste AI, il tuo assistente vocale.");
    }

    else if(text.includes("come stai")){
        speak("Sto benissimo, grazie!");
    }

    else if(text.includes("cosa puoi fare")){
        speak("Posso aprire siti, cercare su internet e parlare con te!");
    }

    else if(text.includes("ripeti")){
        speak(lastCommand ? "Hai detto: " + lastCommand : "Non ho nulla da ripetere");
    }

    // 😂 DIVERTIMENTO
    else if(text.includes("scherzo")){
        speak("Ahah! Sei un programmatore? allora niente bug, solo feature!");
    }

    else if(text.includes("ridere")){
        speak("Ahah! Spero di averti fatto sorridere!");
    }

    // 🎵 MUSICA
    else if(text.includes("musica rock")){
        speak("Apro musica rock");
        window.open("https://www.youtube.com/results?search_query=rock+music","_blank");
    }

    else if(text.includes("musica rap")){
        speak("Apro musica rap");
        window.open("https://www.youtube.com/results?search_query=rap+italiano","_blank");
    }

    else if(text.includes("musica")){
        speak("Apro musica su YouTube");
        window.open("https://www.youtube.com/results?search_query=musica","_blank");
    }

    // 🌍 INTERNET
    else if(text.includes("google")){
        openSite("Google","https://www.google.com");
    }

    else if(text.includes("youtube")){
        openSite("YouTube","https://www.youtube.com");
    }

    // 🧠 DEFAULT
    else{
        speak("Non ho capito il comando");
    }
}
</script>

</body>
</html>
